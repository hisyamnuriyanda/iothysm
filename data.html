<!DOCTYPE html>
<html>
<head>
    <title>Isi Biodata</title>
</head>
<body>

    <h2>Isi Data Diri</h2>

    <!-- FORM -->
    <form id="formData">
        <label>Nama:</label><br>
        <input type="text" id="nama" required><br><br>

        <label>Umur:</label><br>
        <input type="number" id="umur" required><br><br>

        <label>Gender:</label><br>
        <select id="gender">
            <option value="Laki-laki">Laki-laki</option>
            <option value="Perempuan">Perempuan</option>
        </select><br><br>

        <label>Tanggal:</label><br>
        <input type="date" id="tanggal" required><br><br>

        <button type="submit">Simpan</button>
    </form>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD6N0Mn2eQFgtYzfGSN0vVec7gf1IVe9eI",
            authDomain: "iothsym.firebaseapp.com",
            projectId: "iothsym",
            appId: "1:747762617946:web:ceceb7658982c7ecb99263"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        let currentUser = null;

        // 🔐 cek login
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;

                let key = "biodata_" + user.uid;
                let biodata = JSON.parse(localStorage.getItem(key));

                // 🔥 jika sudah ada → isi ke form (MODE EDIT)
                if (biodata) {
                    document.getElementById("nama").value = biodata.nama;
                    document.getElementById("umur").value = biodata.umur;
                    document.getElementById("gender").value = biodata.gender;
                    document.getElementById("tanggal").value = biodata.tanggal;
                }

            } else {
                window.location.href = "index.html";
            }
        });

        // 🔥 EVENT FORM (INI YANG SEBELUMNYA HILANG)
        document.getElementById("formData").addEventListener("submit", function(e){
            e.preventDefault();

            let nama = document.getElementById("nama").value.trim();
            let umur = document.getElementById("umur").value;
            let gender = document.getElementById("gender").value;
            let tanggal = document.getElementById("tanggal").value;

            let key = "biodata_" + currentUser.uid;

            // 🔥 SIMPAN (overwrite = edit)
            localStorage.setItem(key, JSON.stringify({
                nama,
                umur,
                gender,
                tanggal
            }));

            alert("Biodata berhasil disimpan!");

            window.location.href = "dashboard.html";
        });

    </script>

</body>
</html>
