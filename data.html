<!DOCTYPE html>
<html>
<head>
    <title>Isi Biodata</title>
</head>
<body>
    <h2>Isi Data Diri</h2>

    <!-- ✅ FORM -->
    <form id="formData">
        <label>Nama:</label><br>
        <input type="text" id="nama" required><br><br>

        <label>Umur:</label><br>
        <input type="number" id="umur" required><br><br>

        <label>Gender:</label><br>
        <select id="gender">
            <option value="Laki-laki">Laki-laki</option>
            <option value="Perempuan">Perempuan</option>
        </select><br><br>

        <label>Tanggal:</label><br>
        <input type="date" id="tanggal" required><br><br>

        <button type="submit">Simpan</button>
    </form>

    <!-- 🔥 SCRIPT -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD6N0Mn2eQFgtYzfGSN0vVec7gf1IVe9eI",
            authDomain: "iothsym.firebaseapp.com",
            projectId: "iothsym",
            appId: "1:747762617946:web:ceceb7658982c7ecb99263"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // 🔐 CEK LOGIN
        onAuthStateChanged(auth, (user) => {
            if (!user) {
                alert("Silakan login terlebih dahulu!");
                window.location.href = "index.html";
            }
        });

        // 💾 SIMPAN DATA
        document.getElementById("formData").addEventListener("submit", function(e){
            e.preventDefault();

            console.log("SIMPAN DIKLIK");

            let nama = document.getElementById("nama").value.trim();
            let umur = document.getElementById("umur").value;
            let gender = document.getElementById("gender").value;
            let tanggal = document.getElementById("tanggal").value;

            let data = JSON.parse(localStorage.getItem("dataDiri")) || [];

            data.push({
                nama: nama,
                umur: umur,
                gender: gender,
                tanggal: tanggal
            });

            localStorage.setItem("dataDiri", JSON.stringify(data));

            alert("Data berhasil disimpan!");

            // ✅ LANGSUNG PINDAH
            window.location.href = "record.html";
        });
    </script>
</body>
</html>
