<!DOCTYPE html>
<html>
<head>
    <title>Data Diri</title>
</head>
<body>
    <h2>Isi Data Diri</h2>

    <form onsubmit="simpanData(event)">
        <label>Nama:</label><br>
        <input type="text" id="nama" required><br><br>

        <label>Umur:</label><br>
        <input type="number" id="umur" required><br><br>

        <label>Gender:</label><br>
        <select id="gender">
            <option>Laki-laki</option>
            <option>Perempuan</option>
        </select><br><br>

        <label>Tanggal:</label><br>
        <input type="date" id="tanggal" required><br><br>

        <button type="submit">Simpan</button>
    </form>

    <script>
        function simpanData(e){
            e.preventDefault();

            let data = {
                nama: document.getElementById("nama").value,
                umur: document.getElementById("umur").value,
                gender: document.getElementById("gender").value,
                tanggal: document.getElementById("tanggal").value
            };

            let semuaData = JSON.parse(localStorage.getItem("dataDiri")) || [];
            semuaData.push(data);

            localStorage.setItem("dataDiri", JSON.stringify(semuaData));

            alert("Data tersimpan!");
            window.location.href = "record.html";
        }
    </script>
</body>
</html>
