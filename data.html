<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyD6N0Mn2eQFgtYzfGSN0vVec7gf1IVe9eI",
    authDomain: "iothsym.firebaseapp.com",
    projectId: "iothsym",
    appId: "1:747762617946:web:ceceb7658982c7ecb99263"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// 🔐 cek login
onAuthStateChanged(auth, (user) => {
    if (!user) {
        window.location.href = "index.html";
    }
});

// 💾 simpan ke localStorage
window.simpanData = function(e){
    e.preventDefault();

    let nama = document.getElementById("nama").value.trim();
    let umur = document.getElementById("umur").value;
    let gender = document.getElementById("gender").value;
    let tanggal = document.getElementById("tanggal").value;

    let data = JSON.parse(localStorage.getItem("dataDiri")) || [];

    data.push({
        nama,
        umur,
        gender,
        tanggal
    });

    localStorage.setItem("dataDiri", JSON.stringify(data));

    alert("Data berhasil disimpan!");

    window.location.href = "record.html";
}
</script>
