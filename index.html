<!DOCTYPE html>
<html>
<head>
    <title>Record Data</title>
</head>
<body>
    <h2>Record Data Diri & Status Alat</h2>

    <table border="1">
        <thead>
            <tr>
                <th>Nama</th>
                <th>Umur</th>
                <th>Gender</th>
                <th>Tanggal</th>
                <th>Status Alat</th>
            </tr>
        </thead>
        <tbody id="tabelData"></tbody>
    </table>

    <script>
        let data = JSON.parse(localStorage.getItem("dataDiri")) || [];
        let tabel = document.getElementById("tabelData");

        data.forEach(item => {
            let status = Math.random() > 0.5 ? "Normal" : "Stres"; // simulasi hasil alat

            let row = `
                <tr>
                    <td>${item.nama}</td>
                    <td>${item.umur}</td>
                    <td>${item.gender}</td>
                    <td>${item.tanggal}</td>
                    <td>${status}</td>
                </tr>
            `;
            tabel.innerHTML += row;
        });
    </script>
</body>
</html>
