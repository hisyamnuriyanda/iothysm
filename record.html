<!DOCTYPE html>
<html>
<head>
    <title>Record</title>
</head>
<body>

    <h2>Data Tersimpan</h2>

    <!-- ✅ tombol selesai -->
    <button onclick="selesai()">Selesai</button>

    <!-- ✅ tombol download (awal disable) -->
    <button id="btnDownload" onclick="downloadExcel()" disabled>
        Download Excel
    </button>

    <br><br>

    <table border="1" id="tabelData">
        <thead>
            <tr>
                <th>Nama</th>
                <th>Umur</th>
                <th>Gender</th>
                <th>Tanggal</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody id="tabel"></tbody>
    </table>

    <script>
        let tabel = document.getElementById("tabel");
        let data = JSON.parse(localStorage.getItem("dataDiri")) || [];

        // 🔹 tampilkan data
        data.forEach(d => {
            let status = Math.random() > 0.5 ? "Normal" : "Stres";

            tabel.innerHTML += `
                <tr>
                    <td>${d.nama}</td>
                    <td>${d.umur}</td>
                    <td>${d.gender}</td>
                    <td>${d.tanggal}</td>
                    <td>${status}</td>
                </tr>
            `;
        });

        // 🔥 tombol selesai
        function selesai(){
            alert("Proses selesai! Sekarang bisa download.");

            document.getElementById("btnDownload").disabled = false;
        }

        // 🔥 download excel
        function downloadExcel(){
            let table = document.getElementById("tabelData");

            let html = table.outerHTML;

            let blob = new Blob([html], {
                type: "application/vnd.ms-excel"
            });

            let url = URL.createObjectURL(blob);

            let a = document.createElement("a");
            a.href = url;
            a.download = "data_penggunaan.xls";
            a.click();

            URL.revokeObjectURL(url);
        }
    </script>

</body>
</html>
