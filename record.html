<!DOCTYPE html>
<html>
<head>
    <title>Record</title>
</head>
<body>

    <h2>Data Tersimpan</h2>

    <!-- tombol -->
    <button onclick="selesai()">Selesai</button>
    <button id="btnDownload" onclick="downloadExcel()" disabled>
        Download Excel
    </button>

    <br><br>

    <table border="1" id="tabelData">
        <thead>
            <tr>
                <th>Nama</th>
                <th>Umur</th>
                <th>Gender</th>
                <th>Tanggal</th>
                <th>Waktu</th>
                <th>Status</th>
                <th>Aksi</th>
            </tr>
        </thead>
        <tbody id="tabel"></tbody>
    </table>

    <script>
        let tabel = document.getElementById("tabel");
        let data = JSON.parse(localStorage.getItem("dataDiri")) || [];

        // 🔥 fungsi render ulang tabel
        function tampilkanData(){
            tabel.innerHTML = "";

            data.forEach((d, index) => {
                let status = Math.random() > 0.5 ? "Normal" : "Stres";

                tabel.innerHTML += `
                    <tr>
                        <td>${d.nama}</td>
                        <td>${d.umur}</td>
                        <td>${d.gender}</td>
                        <td>${d.tanggal}</td>
                        <td>${d.waktu}</td>
                        <td>${status}</td>
                        <td>
                            <button onclick="editData(${index})">Edit</button>
                            <button onclick="hapusData(${index})">Hapus</button>
                        </td>
                    </tr>
                `;
            });
        }

        // 🔥 tambah waktu otomatis jika belum ada
        data = data.map(d => {
            if(!d.waktu){
                let now = new Date();
                d.waktu = now.toLocaleTimeString();
            }
            return d;
        });

        localStorage.setItem("dataDiri", JSON.stringify(data));

        tampilkanData();

        // 🔥 EDIT DATA
        function editData(index){
            let d = data[index];

            let nama = prompt("Edit Nama:", d.nama);
            let umur = prompt("Edit Umur:", d.umur);
            let gender = prompt("Edit Gender:", d.gender);
            let tanggal = prompt("Edit Tanggal:", d.tanggal);

            if(nama && umur && gender && tanggal){
                data[index] = {
                    ...d,
                    nama,
                    umur,
                    gender,
                    tanggal
                };

                localStorage.setItem("dataDiri", JSON.stringify(data));
                tampilkanData();
            }
        }

        // 🔥 HAPUS DATA
        function hapusData(index){
            if(confirm("Yakin ingin menghapus data?")){
                data.splice(index, 1);
                localStorage.setItem("dataDiri", JSON.stringify(data));
                tampilkanData();
            }
        }

        // 🔥 tombol selesai
        function selesai(){
            alert("Proses selesai! Sekarang bisa download.");
            document.getElementById("btnDownload").disabled = false;
        }

        // 🔥 download excel
        function downloadExcel(){
            let table = document.getElementById("tabelData");
            let html = table.outerHTML;

            let blob = new Blob([html], {
                type: "application/vnd.ms-excel"
            });

            let url = URL.createObjectURL(blob);

            let a = document.createElement("a");
            a.href = url;
            a.download = "data_penggunaan.xls";
            a.click();

            URL.revokeObjectURL(url);
        }
    </script>

</body>
</html>
